name: 自动检测ncm-api-rs并构建

on:
  schedule:
    - cron: '0 0/12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出本仓库（获取 Dockerfile）
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: 检出原始代码库
        uses: actions/checkout@v3
        with:
          repository: imsyy/ncm-api-rs # 原始仓库地址
          ref: main # 要检测的分支
          fetch-depth: 0 # 完整克隆
          path: src # 检出到 src 目录

      - name: 登录 Docker 镜像仓库
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登陆 GitHub 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取最新提交哈希
        id: last_commit
        run: |
          cd src && echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: 检查缓存是否存在
        id: cache
        uses: actions/cache@v3
        with:
          path: src/.git
          key: ${{ runner.os }}-git-${{ steps.last_commit.outputs.hash }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/ncm-api-rs
            ghcr.io/${{ github.repository_owner }}/ncm-api-rs
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern=latest,enable={{is_default_branch}}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        if: (github.event_name == 'schedule' && steps.cache.outputs.cache-hit != 'true') || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: . # 指定构建上下文路径为项目根目录
          file: Dockerfile # 指定使用本仓库的 Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1 # 启用 BuildKit 以获取更详细的构建日志
